<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- ——— SEO essentials ——— -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Hazel &amp; Hue | AI-Powered Personal Color Analysis in 30 Seconds</title>
    <meta name="description" content="Discover your perfect palette with our AI-powered 12-season color analysis. Get personalized style recommendations, makeup guides, and professional reports instantly." />
    
    <!-- Additional SEO Meta Tags -->
    <meta name="keywords" content="color analysis, seasonal color analysis, personal color analysis, AI color analysis, style consultant, makeup recommendations, color palette, fashion advice, seasonal colors, color matching" />
    <meta name="author" content="Hazel & Hue" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="theme-color" content="#2D5A3D" />
    
    <!-- Performance & Loading -->
    <meta name="format-detection" content="telephone=no" />
    <link rel="preload" href="/src/main.tsx" as="script" />
    
    <!-- Social Media Optimization -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@hazelandhue" />
    <meta name="twitter:creator" content="@hazelandhue" />
    <meta name="twitter:title" content="Hazel & Hue | AI Color Analysis" />
    <meta name="twitter:description" content="Find the colors that make you glow with our AI-powered seasonal color analysis." />
    <meta name="twitter:image" content="https://hazelandhue.com/og-cover.jpg" />
    <link rel="canonical" href="https://hazelandhue.com/" />
    
    <!-- Open Graph for social shares -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Hazel &amp; Hue | AI Color Analysis" />
    <meta property="og:description" content="Find the colors that make you glow with our AI-powered seasonal color analysis." />
    <meta property="og:url" content="https://hazelandhue.com/" />
    <meta property="og:image" content="https://hazelandhue.com/og-cover.jpg" />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Performance Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://api.hazelandhue.com">
    
    <!-- Structured Data Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Hazel & Hue",
      "url": "https://hazelandhue.com",
      "logo": "https://hazelandhue.com/logo.png",
      "description": "AI-powered seasonal color analysis providing personalized style recommendations and professional color reports.",
      "foundingDate": "2025",
      "serviceArea": {
        "@type": "Place",
        "name": "Worldwide"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "email": "jayda@hazelandhue.com"
      },
      "sameAs": ["https://www.instagram.com/hazelandhue"],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Color Analysis Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "AI-Powered Color Analysis",
              "description": "Professional 12-season color analysis with personalized style recommendations"
            }
          }
        ]
      }
    }
    </script>
    
    <!-- Structured Data WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Hazel & Hue",
      "url": "https://hazelandhue.com",
      "description": "AI-powered personal color analysis platform",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://hazelandhue.com/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
