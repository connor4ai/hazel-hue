    <circle cx="60" cy="50" r="12" fill="#F0E68C" stroke="#DDD" stroke-width="1"/>
    <circle cx="90" cy="50" r="12" fill="#98FB98" stroke="#DDD" stroke-width="1"/>
    <circle cx="120" cy="50" r="12" fill="#87CEEB" stroke="#DDD" stroke-width="1"/>
    <circle cx="150" cy="50" r="12" fill="#DDA0DD" stroke="#DDD" stroke-width="1"/>
