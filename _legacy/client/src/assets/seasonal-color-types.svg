    <circle cx="30" cy="50" r="12" fill="#FF6347"/>
    <circle cx="60" cy="50" r="12" fill="#FFD700"/>
    <circle cx="90" cy="50" r="12" fill="#32CD32"/>
    <circle cx="120" cy="50" r="12" fill="#00CED1"/>
    <circle cx="150" cy="50" r="12" fill="#FF69B4"/>
    <circle cx="30" cy="80" r="12" fill="#FF8C00"/>
