        <h2>Frequently Asked Questions</h2>
        <h3>What is seasonal color analysis?</h3>
        <p>Seasonal color analysis determines which colors look best on you based on your natural coloring — skin undertone, eye color, and hair color. It categorizes you into one of 12 seasons (e.g., True Spring, True Summer, Deep Autumn) each with a curated palette of 30+ colors that harmonize with your features.</p>
        <h3>How accurate is AI color analysis?</h3>
        <p>Our AI has been trained on thousands of professional color analyses and uses advanced computer vision to examine your skin's undertone, contrast level, and chroma. Most users find the results match or exceed what they'd get from an in-person consultation.</p>
        <h3>Is it really free? What's the catch?</h3>
        <p>There is no catch. Hazel &amp; Hue is completely free — no hidden fees, no trials, no premium tiers. We believe in growing through genuine word-of-mouth rather than paywalls. You get all 10 guides at no cost.</p>
        <h3>What kind of photo should I use?</h3>
        <p>For the best results, use a photo taken in natural daylight (near a window or outdoors). Avoid heavy makeup, filters, or artificial lighting. A straight-on selfie showing your face, neck, and a bit of your shoulders works best.</p>
        <h3>How is this different from online quizzes?</h3>
        <p>Online quizzes rely on you self-reporting your coloring, which is notoriously unreliable. Our AI actually analyzes the pixels of your photo to objectively measure your undertone, contrast, and chroma — no guesswork.</p>
        <h3>How long does the analysis take?</h3>
        <p>The AI analysis typically completes in about 45 seconds.</p>
